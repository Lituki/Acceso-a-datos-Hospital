<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Medicamento</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>
<div th:replace="fragments/nav :: nav"></div>
<div class="container">
    <h1 th:text="${medicamento.id} == null ? 'Nuevo medicamento' : 'Editar medicamento'"></h1>
    <form th:action="@{/medicamentos/guardar}" th:object="${medicamento}" method="post">
        <input type="hidden" th:field="*{id}" />
        <div>
            <label>Nombre</label>
            <input type="text" th:field="*{nombre}" />
        </div>
        <div>
            <label>Composición</label>
            <input type="text" th:field="*{composicion}" />
        </div>
        <div>
            <label>Precio</label>
            <input type="number" step="0.01" th:field="*{precio}" />
        </div>
        <div>
            <label>Unidad</label>
            <input type="text" th:field="*{unidad}" />
        </div>
        <div class="actions">
            <button type="submit">Guardar</button>
            <a class="btn" th:href="@{/medicamentos}">Cancelar</a>
        </div>
    </form>
</div>
</body>
</html>
