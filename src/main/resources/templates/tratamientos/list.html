<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Tratamientos</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>
<div th:replace="fragments/nav :: nav"></div>
<div class="container">
    <h1>Tratamientos</h1>
    <div class="actions">
        <a class="btn" th:href="@{/tratamientos/nuevo}">Nuevo tratamiento</a>
    </div>
    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Cita</th>
            <th>Descripcion</th>
            <th>Duracion</th>
            <th>Frecuencia</th>
            <th>Medicamentos</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="t : ${tratamientos}">
            <td th:text="${t.id}"></td>
            <td th:text="${t.cita != null ? t.cita.id : ''}"></td>
            <td th:text="${t.descripcion}"></td>
            <td th:text="${t.duracion}"></td>
            <td th:text="${t.frecuencia}"></td>
            <td>
                <span th:if="${t.medicamentos != null}">
                    <span th:each="m, iter : ${t.medicamentos}">
                        <span th:text="${m.nombre}"></span><span th:if="${!iter.last}">, </span>
                    </span>
                </span>
            </td>
            <td>
                <a th:href="@{'/tratamientos/ver/' + ${t.id}}">Ver</a>
                <a th:href="@{'/tratamientos/editar/' + ${t.id}}">Editar</a>
                <form th:action="@{'/tratamientos/borrar/' + ${t.id}}" method="post" style="display:inline">
                    <button type="submit" onclick="return confirm('Borrar tratamiento?')">Borrar</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
