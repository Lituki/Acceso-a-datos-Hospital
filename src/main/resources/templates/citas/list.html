<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Citas</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>
<div th:replace="fragments/nav :: nav"></div>
<div class="container">
    <h1>Citas</h1>
    <a class="btn" th:href="@{/citas/nuevo}">Nueva cita</a>
    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Fecha</th>
            <th>Motivo</th>
            <th>Paciente</th>
            <th>Médicos</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="c : ${citas}">
            <td th:text="${c.id}"></td>
            <td th:text="${c.fechaHora}"></td>
            <td th:text="${c.motivo}"></td>
            <td th:text="${c.paciente != null ? c.paciente.nombre + ' ' + c.paciente.apellido : ''}"></td>
                <td>
                    <span th:if="${c.medicos != null}">
                        <span th:each="m,iterStat : ${c.medicos}">
                            <span th:text="${m.nombre} + ' ' + ${m.apellido}"></span>
                            <span th:if="${!iterStat.last}">, </span>
                        </span>
                    </span>
                </td>
            <td>
                <a th:href="@{'/citas/editar/' + ${c.id}}">Editar</a>
                <form th:action="@{'/citas/borrar/' + ${c.id}}" method="post" style="display:inline">
                    <button type="submit" onclick="return confirm('¿Borrar cita?')">Borrar</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
