<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Cita</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>
<div th:replace="fragments/nav :: nav"></div>
<div class="container">
    <h1 th:text="${cita.id} == null ? 'Nueva cita' : 'Editar cita'"></h1>
    <form th:action="@{/citas/guardar}" th:object="${cita}" method="post">
        <input type="hidden" th:field="*{id}" />
        <div>
            <label>Fecha y hora</label>
            <input type="datetime-local" th:field="*{fechaHora}" />
        </div>
        <div>
            <label>Motivo</label>
            <input type="text" th:field="*{motivo}" />
        </div>
        <div>
            <label>Observaciones</label>
            <input type="text" th:field="*{observaciones}" />
        </div>
        <div>
            <label>Paciente</label>
            <select th:field="*{paciente.id}">
                <option th:each="p : ${pacientes}" th:value="${p.id}" th:text="${p.nombre + ' ' + p.apellido}"></option>
            </select>
        </div>
        <div>
            <label>Médicos </label>
            <select name="medicoIds" multiple size="5">
                <option th:each="m : ${medicos}" th:value="${m.id}" th:text="${m.nombre + ' ' + m.apellido}"></option>
            </select>
        </div>
        <div class="actions">
            <button type="submit">Guardar</button>
            <a class="btn" th:href="@{/citas}">Cancelar</a>
        </div>
    </form>
</div>
</body>
</html>
